<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Rejected Luna Is the Alpha Queen · EP1 互动 Demo</title>
<style>
  :root{ --gold:#e8b44a; --amber:#ff9d2e; --bad:#e85a6b; --silver:#9fd0ff; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#05080d;font-family:"Microsoft YaHei","PingFang SC",sans-serif;color:#eaf1fb;-webkit-tap-highlight-color:transparent}
  #app{height:100%;display:flex;align-items:center;justify-content:center}
  #frame{position:relative;width:min(96vw,54vh,484px);height:min(96vh,170.67vw,860px);background:#0a0e16;border-radius:18px;overflow:hidden;box-shadow:0 0 0 1px #233247,0 18px 60px rgba(0,0,0,.6)}
  video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;display:none}
  video.on{display:block}

  .layer{position:absolute;inset:0;display:none;flex-direction:column;justify-content:flex-end;
         background:linear-gradient(180deg,rgba(5,9,16,.15) 30%,rgba(4,8,15,.6) 60%,rgba(3,6,12,.95) 100%);
         padding:22px 18px 26px;gap:12px}
  .layer.show{display:flex}
  #hud{position:absolute;top:12px;left:14px;right:14px;font-size:11px;color:#8aa0bd;background:rgba(3,6,12,.55);padding:4px 10px;border-radius:10px;z-index:5}

  .scene{justify-content:flex-end}
  .scene .seg{color:var(--gold);font-size:12px;letter-spacing:3px;margin-bottom:4px}
  .scene .desc{font-size:15px;line-height:1.6;color:#dce7f5;background:rgba(0,0,0,.4);border-left:3px solid var(--gold);border-radius:8px;padding:12px 14px;white-space:pre-line}
  .scene .dlg{font-size:14px;color:#ffe9b0;line-height:1.6;margin:2px 0}
  .scene .dlg .sp{color:#9fc0e6;margin-right:6px}

  .qbar{position:absolute;top:44px;left:0;right:0;padding:14px 18px;font-size:14px;color:#dbe7f6;
        background:linear-gradient(180deg,rgba(3,6,12,.82),rgba(3,6,12,0))}
  .qbar b{color:var(--gold)}
  .choices{display:flex;flex-direction:column;gap:11px}
  .btn{appearance:none;border:1px solid #3a4f6b;background:rgba(18,30,46,.88);color:#eaf1fb;
       font-size:15px;line-height:1.35;padding:13px 15px;border-radius:12px;text-align:left;cursor:pointer;transition:.12s}
  .btn:hover{border-color:var(--gold);background:rgba(30,44,64,.96)}
  .btn .k{color:var(--amber);font-weight:bold;margin-right:8px}
  .cta{align-self:center;margin-top:6px;border:1px solid var(--gold);background:rgba(232,180,74,.16);color:#fff;font-size:16px;padding:12px 30px;border-radius:28px;cursor:pointer}
  .cta:hover{background:rgba(232,180,74,.3)}
  .hint{align-self:center;color:#7892ab;font-size:11.5px}

  .center{justify-content:center;align-items:center;text-align:center;background:radial-gradient(120% 80% at 50% 30%,rgba(28,40,62,.62),rgba(3,6,12,.97))}
  .center h1{margin:0 0 4px;font-size:24px;letter-spacing:1px;color:#fff}
  .center .sub{color:var(--gold);font-size:12px;letter-spacing:4px;margin-bottom:14px}
  .center p{margin:5px 0;color:#a8bdd6;font-size:14px;max-width:92%}

  .bad{justify-content:center;background:linear-gradient(160deg,rgba(58,22,32,.96),rgba(8,10,18,.98))}
  .bad .tag{align-self:center;color:var(--bad);font-size:12px;letter-spacing:3px;margin-bottom:6px}
  .bad h2{align-self:center;margin:0 0 6px;font-size:22px;color:#ffd6dc;text-align:center}
  .bad .sub{align-self:center;color:var(--silver);font-size:14px;font-style:italic;margin:0 0 14px;text-align:center}
  .bad .beats{background:rgba(0,0,0,.32);border-left:3px solid var(--bad);border-radius:8px;padding:11px 13px;margin:0 0 14px}
  .bad .beats div{font-size:13.5px;color:#f0d9dd;line-height:1.55;margin:3px 0}
  .bad .row{display:flex;gap:10px;justify-content:center}
  .bad .row button{border:1px solid #6a3a44;background:rgba(58,22,32,.6);color:#ffd6dc;font-size:14px;padding:10px 16px;border-radius:22px;cursor:pointer}
  .bad .row button.primary{border-color:var(--gold);color:#fff;background:rgba(232,180,74,.16)}
</style>
</head>
<body>
<div id="app"><div id="frame">
  <video id="vid" playsinline preload="auto"></video>
  <div id="hud" style="display:none"></div>
  <div class="qbar" id="qbar" style="display:none"></div>

  <div class="layer center show" id="startLayer">
    <h1>Rejected Luna Is the Alpha Queen</h1>
    <div class="sub">EP1 · 互动短剧 DEMO</div>
    <p>你是 <b style="color:#fff">Arya</b>——月女神血脉的隐藏强者。<br>母亲战死时要你藏起力量、平凡地活。</p>
    <p>你嫁给了 Alpha <b>Micah</b>。一年后，他带着怀孕的 <b>Vera</b> 回来。</p>
    <p style="color:#7d93ad;font-size:12.5px">正确路径＝原片；选错也有真·坏结局视频。</p>
    <button class="cta" id="startBtn">▶ 开始</button>
  </div>

  <div class="layer scene" id="sceneLayer">
    <div class="seg" id="sceneSeg"></div>
    <div class="desc" id="sceneDesc"></div>
    <div id="sceneDlg"></div>
    <button class="cta" id="sceneNext">继续 ▶</button>
  </div>

  <div class="layer" id="choiceLayer">
    <div class="choices" id="choices"></div>
    <div class="hint">选对续播原片 · 选错走坏结局</div>
  </div>

  <div class="layer bad" id="badLayer">
    <div class="tag">BAD END</div>
    <h2 id="badTitle"></h2>
    <div class="sub" id="badSub"></div>
    <div class="beats" id="badBeats"></div>
    <div class="row">
      <button class="primary" id="badRetry">↻ 重开本节点</button>
      <button id="badRestart">⟲ 从头开始</button>
    </div>
  </div>

  <div class="layer center" id="endLayer">
    <h1 style="font-size:21px">👑 The Queen Rises</h1>
    <p style="color:var(--gold);font-style:italic">"You rejected a Luna. You woke a Queen."</p>
    <p>银光在你眼底亮起，没有失控。背叛你的人还不知道——<br>他们唤醒的是月女神选中的女王。</p>
    <p style="color:#7d93ad;font-size:12.5px">—— 待续 EP2 ——</p>
    <button class="cta" id="endBtn">⟲ 再玩一次</button>
  </div>
</div></div>

<script>
/* 正确路径=原片(clips/segN.mp4); 坏结局已接入真视频(clips/bad_*.mp4): 播放完落到文字卡+重选 */
const STORY = {
  segments: {
    seg1: { src:"clips/seg1.mp4?v=3", hud:"原片 0:00–0:46 · 血战·母亲战死·『Arya! Promise me!』",
      seg:"SEG 1 · The Last Wish", desc:"一场血战。母亲倒在战场上，气息将尽。\n她攥住你的手，要你答应：藏好月女神的力量，找个伴侣，像普通狼一样活下去。",
      dlg:[["母亲","Arya! Promise me!"]], decision:"d1" },
    seg2: { src:"clips/seg2.mp4?v=7", hud:"原片 0:46–1:49 · 应下遗愿·力量觉醒·婚礼·出征在即",
      seg:"SEG 2 · The Vow, The Power, The Wedding", desc:"你含着泪应下了：找 mate、结婚、生子，凭月女神保佑。话音一落，妈在你怀里断了气——月女神的力量随之在你身上炸开，满林子只有狼看见。\n你把这秘密压进心底，嫁给了 Alpha Micah，他当众认你做 Luna。可喜事没几天，他就要奔赴战场，临走说：等他回来，你们就再不分开。",
      dlg:[["Micah","When I return from the battlefield, we will never be apart again!"]], decision:"d2" },
    seg3: { src:"clips/seg3.mp4?v=5", hud:"原片 1:49–2:20 · 守望一年 → Vera 登场 → 背叛",
      seg:"SEG 3 · The Betrayal", desc:"你留了下来，替他守着家、守着族，等他平安归来。\n一年过去，他回来了——身边却带着怀孕的 Vera，说她才是他命定的 mate、未来的 Luna。",
      dlg:[["Micah","Arya, this is Vera. She's my fated mate."]], decision:"d3" },
    seg4: { src:"clips/seg4.mp4?v=2", hud:"原片 2:20–2:40 · 当众清算·女王觉醒(钩子)",
      seg:"SEG 4 · The Queen Awakens", desc:"你没有失态。你看着 Micah，问他还记不记得在月女神面前发过的誓。\n眼底银光升起，这一次你没有再压回去。",
      dlg:[["Arya","Do you remember the vow you made on our wedding day?"]], decision:"end" }
  },
  decisions: {
    d1: { q:"母亲在你怀里气息将尽，最后用力攥住你：『答应我！』——藏好力量，找个伴侣，像普通狼一样活下去。你——", replay:"seg1", options:[
      { label:"我答应你——藏起力量，好好活", go:"seg2" },
      { label:"我不嫁人，我要为你复仇", bad:"end_revenge" },
      { label:"我现在就用力量救你", bad:"end_savepower" } ]},
    d2: { q:"Micah 要上战场了，说等他回来就再不分开。临行前，部落的人看向你。你——", replay:"seg2", options:[
      { label:"留下来好好当 Luna，等他平安回来", go:"seg3" },
      { label:"我跟你并肩上战场，亮出力量", bad:"end_warexpose" },
      { label:"当众宣布：他不在，部落往后听你的", bad:"end_powergrab" } ]},
    d3: { q:"Micah 当着满堂宾客，把怀孕的 Vera 介绍成命定 mate、未来的 Luna——『就像你一样』。你——", replay:"seg3", options:[
      { label:"稳住，当众问他还记不记得对月女神发过的誓", go:"seg4" },
      { label:"默默离开部落，把 Luna 的位置让出去", bad:"end_leave" },
      { label:"压不住怒火，当场放出力量扑向他", bad:"end_killmate" } ]}
  },
  badEnds: {
    end_revenge:{ title:"💀 你葬了她的遗愿", sub:"You buried her wish with her.", replay:"seg1", video:"clips/bad_revenge.mp4",
      beats:["你转身扑向害死母亲的那群狼。","从此你只剩复仇，再没顾过自己的命。","母亲要你藏好力量、好好活——这话你没听。"] },
    end_savepower:{ title:"💀 力量救不了死亡", sub:"Power can't outrun death — only expose you.", replay:"seg1", video:"clips/bad_savepower.mp4",
      beats:["你放出月女神的力量去救她。","可她的伤太重，没能拉回来，还是走了。","你白白把这秘密，当众暴露给了敌人。"] },
    end_warexpose:{ title:"💀 你藏不住了", sub:"The secret burned away in front of everyone.", replay:"seg2", video:"clips/bad_warexpose.mp4",
      beats:["你当众说要随 Micah 出征，话没说完，蓝光就从掌心冒了出来。","满场的人都看见了，Micah 也僵在原地。","月女神血脉还活着的消息，当晚就传遍各族。"] },
    end_powergrab:{ title:"💀 话说得太满", sub:"She grabbed for power too soon.", replay:"seg2", video:"clips/bad_powergrab.mp4",
      beats:["你当众宣布：Micah 不在，部落往后听你的。","可他前脚刚走，没人真把你的话当令，长老当场就驳了回来。","等他回来，族里都说你急着抢位子，他也开始防着你。"] },
    end_leave:{ title:"💀 你把位置让了出去", sub:"She walked away and let it go.", replay:"seg3", video:"clips/bad_leave.mp4",
      beats:["你把 Luna 的位置让了出去，只说了句『拿去吧，我不争了』。","Vera 顺理成章接了位置，没人再提起你。","你走得干净，可翻盘的机会也没了。"] },
    end_killmate:{ title:"💀 你失控了", sub:"She lost control. They pinned her down.", replay:"seg3", video:"clips/bad_killmate.mp4",
      beats:["怒火压不住，你的力量在大殿里炸了开。","Micah 冲你喊『住手』，几个卫兵已经扑了上来。","他们把你死死按在地上，秘密再也藏不住了。"] }
  }
};

const vid=document.getElementById('vid'), hud=document.getElementById('hud'), qbar=document.getElementById('qbar');
const L={start:'startLayer',scene:'sceneLayer',choice:'choiceLayer',bad:'badLayer',end:'endLayer'};
function hideAll(){Object.values(L).forEach(id=>document.getElementById(id).classList.remove('show'));}
function show(n){hideAll();document.getElementById(L[n]).classList.add('show');}
let current=null, mode='seg', curBad=null;

function playSegment(id){
  const s=STORY.segments[id]; current=id;
  qbar.style.display='none'; hud.style.display='block'; hud.textContent=s.hud;
  if(s.src){ mode='seg'; vid.classList.add('on'); hideAll(); vid.src=s.src; vid.currentTime=0; const p=vid.play(); if(p&&p.catch)p.catch(()=>{}); return; }
  vid.classList.remove('on');
  document.getElementById('sceneSeg').textContent=s.seg||'';
  document.getElementById('sceneDesc').innerText=s.desc||'';
  document.getElementById('sceneDlg').innerHTML=(s.dlg||[]).map(([sp,l])=>`<div class="dlg"><span class="sp">${sp}：</span>${l}</div>`).join('');
  show('scene');
}
document.getElementById('sceneNext').onclick=()=>advance();
function advance(){ const s=STORY.segments[current]; if(!s)return; if(s.decision==='end'){show('end');return;} showDecision(s.decision); }
vid.addEventListener('ended',()=>{ if(mode==='badvideo'){ showBadCard(curBad); return; } advance(); });

function showDecision(id){
  const d=STORY.decisions[id]; hud.style.display='none';
  qbar.style.display='block'; qbar.innerHTML=`<b>▶ 选择</b> · ${d.q}`;
  const box=document.getElementById('choices'); box.innerHTML='';
  ['A','B','C'].forEach((k,i)=>{ const o=d.options[i]; if(!o)return;
    const b=document.createElement('button'); b.className='btn';
    b.innerHTML=`<span class="k">${k}</span>${o.label}`;
    b.onclick=()=>{ o.go?playSegment(o.go):showBad(o.bad); };
    box.appendChild(b); });
  show('choice');
}
function showBad(id){
  const e=STORY.badEnds[id];
  if(e.video){ mode='badvideo'; curBad=id; vid.classList.add('on'); hideAll(); qbar.style.display='none'; hud.style.display='none'; vid.src=e.video; vid.currentTime=0; const p=vid.play(); if(p&&p.catch)p.catch(()=>{}); return; }
  showBadCard(id);
}
function showBadCard(id){
  const e=STORY.badEnds[id]; vid.classList.remove('on'); qbar.style.display='none'; hud.style.display='none';
  document.getElementById('badTitle').textContent=e.title;
  document.getElementById('badSub').textContent='「'+e.sub+'」';
  document.getElementById('badBeats').innerHTML=e.beats.map(t=>`<div>· ${t}</div>`).join('');
  document.getElementById('badRetry').onclick=()=>playSegment(e.replay);
  document.getElementById('badRestart').onclick=()=>playSegment('seg1');
  try{vid.pause();}catch(_){}
  show('bad');
}
document.getElementById('startBtn').onclick=()=>playSegment('seg1');
document.getElementById('endBtn').onclick=()=>playSegment('seg1');
</script>
</body>
</html>
